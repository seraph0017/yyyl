# 非敏感配置（环境变量）
apiVersion: v1
kind: ConfigMap
metadata:
  name: yyyl-config
  namespace: yyyl
data:
  APP_NAME: "一月一露"
  APP_ENV: "production"
  DEBUG: "false"
  API_PREFIX: "/api/v1"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"
  DATABASE_ECHO: "false"
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  LOG_LEVEL: "INFO"
  # CORS — 填入实际域名
  CORS_ORIGINS: '["https://admin.your-domain.com","https://your-domain.com"]'
