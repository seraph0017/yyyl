# ============================================
# 某露营地 — Nginx 网关配置
# 反向代理 + 多级限流 + SSL 终止
# ============================================

# ---- Worker 配置 ----
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ---- 基础优化 ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ---- 日志格式 ----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ============================================
    # 限流区域定义（共享内存）
    # ============================================
    # 全局限流：每个 IP 30 请求/秒
    limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;
    # 普通 API：每个 IP 10 请求/秒
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # 秒杀 API：每个 IP 1 请求/秒（严格限流）
    limit_req_zone $binary_remote_addr zone=seckill:10m rate=1r/s;
    # 登录接口：每个 IP 5 请求/分钟
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # 限流返回 429
    limit_req_status 429;

    # ---- 上游服务 ----
    upstream fastapi_upstream {
        least_conn;
        server api:8000;
        # K8s 环境下由 Service 负责负载均衡
        # Docker Compose 下可增加多个 api 实例：
        # server api_1:8000;
        # server api_2:8000;
    }

    # ============================================
    # HTTP → HTTPS 重定向（生产环境启用）
    # ============================================
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ============================================
    # 主服务
    # ============================================
    server {
        listen 80;
        # 生产环境改用 443 ssl：
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        server_name _;

        # ---- 请求体大小限制 ----
        client_max_body_size 10m;

        # ---- 安全头 ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ---- 健康检查（Nginx 自身） ----
        location /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # ---- 秒杀 API（严格限流：1r/s + burst=5） ----
        location /api/v1/orders/seckill {
            limit_req zone=seckill burst=5 nodelay;

            proxy_pass http://fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;  # 秒杀接口超时短一些
        }

        # ---- 登录接口（限流：5r/m） ----
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- 普通 API（限流：10r/s） ----
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ---- 管理后台静态资源（可选，也可以用独立域名） ----
        location / {
            proxy_pass http://admin:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
